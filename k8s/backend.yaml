apiVersion: apps/v1
kind: Deployment

metadata:
  name: my-backend
  namespace: project-dev

spec:
  replicas: 1

  strategy:
    type: Recreate

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend

          image: us-central1-docker.pkg.dev/project-1-501612/demo/backend:4ac6d3c7f7606dbb295df0f55d854a240de21e51
          
          imagePullPolicy: Always

          ports:
            - containerPort: 5000

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

---
apiVersion: v1
kind: Service

metadata:
  name: my-backend-service
  namespace: project-dev

spec:
  type: ClusterIP

  selector:
    app: backend

  ports:
    - port: 80
      targetPort: 5000