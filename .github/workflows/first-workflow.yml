name: Build and Push Docker Images

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: project-1-501612
  REGION: us-central1
  REPOSITORY: demo
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Authenticate using OIDC (No JSON Key Required)
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1087602702137/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions@project-1-501612.iam.gserviceaccount.com

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker Authentication
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      # Build Frontend Docker Image
      - name: Build Frontend Docker Image
        run: |
          docker build \
            -f Dockerfile.frontend \
            -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/frontend:${{ env.IMAGE_TAG }} .

      # Push Frontend Docker Image
      - name: Push Frontend Docker Image
        run: |
          docker push \
            us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/frontend:${{ env.IMAGE_TAG }}

      # Build Backend Docker Image
      - name: Build Backend Docker Image
        run: |
          docker build \
            -f Dockerfile.backend \
            -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend:${{ env.IMAGE_TAG }} .

      # Push Backend Docker Image
      - name: Push Backend Docker Image
        run: |
          docker push \
            us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend:${{ env.IMAGE_TAG }}

      - name: Build Summary
        run: |
          echo "==========================================="
          echo "Docker Images Successfully Pushed"
          echo "==========================================="
          echo ""
          echo "Frontend:"
          echo "us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/frontend:${{ env.IMAGE_TAG }}"
          echo ""
          echo "Backend:"
          echo "us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend:${{ env.IMAGE_TAG }}"