apiVersion: apps/v1
kind: Deployment

metadata:
  name: my-app
  namespace: project-dev

spec:
  replicas: 1

  selector:
    matchLabels:
      app: my-app

  template:
    metadata:
      labels:
        app: my-app

    spec:
      containers:
        - name: my-app

          image: us-central1-docker.pkg.dev/project-1-501612/demo/frontend:4ac6d3c7f7606dbb295df0f55d854a240de21e51
          
          imagePullPolicy: Always

          ports:
            - containerPort: 8080

          env:
            - name: BACKEND_URL
              value: "http://my-backend-service.project-dev.svc.cluster.local"

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"